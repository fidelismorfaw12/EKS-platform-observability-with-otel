apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-kubernetes-overview
  namespace: observability
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: observability-stack
data:
  k8s-overview.json: |
    {
      "annotations": { "list": [] },
      "title": "Kubernetes Cluster Overview",
      "uid": "k8s-overview",
      "version": 1,
      "schemaVersion": 39,
      "tags": ["kubernetes", "observability"],
      "time": { "from": "now-1h", "to": "now" },
      "refresh": "30s",
      "panels": [
        {
          "type": "stat",
          "title": "Nodes Ready",
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"})", "legendFormat": "ready" }
          ]
        },
        {
          "type": "stat",
          "title": "Total Pods",
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "sum(kube_pod_info)" }
          ]
        },
        {
          "type": "stat",
          "title": "Pods CrashLooping",
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "sum(increase(kube_pod_container_status_restarts_total[1h]) > 5)" }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          }
        },
        {
          "type": "stat",
          "title": "Unschedulable Pods",
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "sum(kube_pod_status_unschedulable)" }
          ]
        },
        {
          "type": "stat",
          "title": "Crashback Pods",
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "sum(kube_pod_container_status_waiting_reason{reason=\"CrashLoopBackOff\"})" }
          ]
        },
        {
          "type": "timeseries",
          "title": "Node CPU %",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "100 * node:cpu_utilization:ratio", "legendFormat": "{{node}}" }
          ]
        },
        {
          "type": "timeseries",
          "title": "Node Memory %",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "100 * node:memory_utilization:ratio", "legendFormat": "{{node}}" }
          ]
        },
        {
          "type": "timeseries",
          "title": "Top 10 pods by CPU",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "topk(10, sum(rate(container_cpu_usage_seconds_total{container!=\"\"}[5m])) by (namespace, pod))", "legendFormat": "{{namespace}}/{{pod}}" }
          ]
        },
        {
          "type": "timeseries",
          "title": "Top 10 pods by Memory",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "topk(10, sum(container_memory_working_set_bytes{container!=\"\"}) by (namespace, pod))", "legendFormat": "{{namespace}}/{{pod}}" }
          ]
        }
      ]
    }
