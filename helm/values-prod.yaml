# =========================================================================== #
#  Prod environment overrides                                                 #
# --------------------------------------------------------------------------- #
#  Goal: HA, durable, alert on real signals.                                  #
# =========================================================================== #

global:
  environment: prod

kubePrometheusStack:
  prometheus:
    prometheusSpec:
      retention: 30d
      retentionSize: 200GB
      replicas: 2                 # HA
      replicaExternalLabelNameClear: false
      prometheusExternalLabelNameClear: false

      # Thanos sidecar for LTSS
      thanos:
        objectStorageConfig:
          key: objstore.yml
          name: thanos-objstore

      serviceAccountName: prometheus
      serviceAccount:
        annotations:
          eks.amazonaws.com/role-arn: ""   # injected

      thanosStorage:
        volumeClaimTemplate:
          spec:
            storageClassName: gp3
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi

  alertmanager:
    alertmanagerSpec:
      replicas: 3
      HAConfig:
        enabled: true

  grafana:
    replicas: 2
    persistence:
      size: 20Gi

# In prod, run Loki in distributed (microservices) mode for HA + scale
loki:
  singleBinary:
    replicas: 0
  deploymentMode: Distributed
  backend:
    replicas: 3
    nodeSelector:
      workload: observability
  read:
    replicas: 3
  write:
    replicas: 3
  compactor:
    replicas: 1
  indexGateway:
    replicas: 2
  resultsCache:
    replicas: 2
  chunksCache:
    replicas: 2
