{{/*
ServiceAccount for the OTel Collector.
We create it explicitly so we can attach the IRSA annotation. The upstream
opentelemetry-collector chart would create one too, but creating it here
gives us a single source of truth that terraform can rely on.
*/}}
{{- if .Values.otelCollector.enabled -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.otelCollector.serviceAccount.name | default "otel-collector" }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: observability-stack
  annotations:
    eks.amazonaws.com/role-arn: ""    # filled by terraform if needed
{{- end }}
